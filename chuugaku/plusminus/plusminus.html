<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>正の数・負の数プリント（加法・減法・乗法・除法）</title>
    <!--
      目的: 中学1年生向けの正の数・負の数の計算プリントを自動生成し、
      問題/模範解答を個別印刷できるページを提供する。
      注意: 画面に表示する文言は日本語、コード(変数名等)は英語、コメントは日本語。
    -->
    <style>
      :root {
        --accent: #2a7ae2;
        --ink: #222;
        --muted: #666;
        --bg: #fff;
        --panel: #f6f8fb;
        --xcol-w: 220px;
        --xcol-w-print: 62mm;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        color: var(--ink);
        background: var(--bg);
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial,
          "Hiragino Kaku Gothic ProN", "Yu Gothic UI", "Noto Sans JP", sans-serif;
        line-height: 1.6;
      }

      header {
        padding: 16px 20px 8px;
      }

      header .title-line {
        display: flex;
        justify-content: center;
        align-items: baseline;
        gap: 12px;
      }

      header h1 {
        margin: 0 0 8px;
        font-size: 20px;
        text-align: center;
      }

      header p {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
      }

      .container {
        padding: 12px 20px 28px;
      }

      .score-box {
        border: 1px solid #333;
        padding: 2px 8px;
        border-radius: 6px;
        font-size: 14px;
      }

      .controls {
        background: var(--panel);
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 16px;
        display: grid;
        gap: 12px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px 16px;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      .field label,
      .check-group legend {
        font-size: 13px;
        color: #333;
      }

      .row {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }

      .row span.sep {
        color: #999;
      }

      .field input[type="number"] {
        padding: 8px 10px;
        border: 1px solid #cfd6e4;
        border-radius: 8px;
        font-size: 14px;
        width: 100%;
        box-sizing: border-box;
      }

      .check-group {
        margin: 0;
        padding: 0;
        border: none;
        display: grid;
        gap: 6px;
      }

      .check-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .check-row label {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .hint {
        font-size: 12px;
        color: var(--muted);
      }

      .buttons {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      button {
        appearance: none;
        border: 1px solid var(--accent);
        background: var(--accent);
        color: #fff;
        padding: 10px 14px;
        border-radius: 10px;
        font-size: 14px;
        cursor: pointer;
      }

      button.secondary {
        background: #fff;
        color: var(--accent);
      }

      .toggle-bar {
        display: flex;
        gap: 8px;
      }

      button.toggle {
        background: #fff;
        color: var(--accent);
      }

      button.toggle.selected {
        background: var(--accent);
        color: #fff;
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .error {
        color: #b00020;
        font-size: 13px;
      }

      .outputs {
        display: grid;
        grid-template-columns: 1fr;
        gap: 20px;
        margin-top: 18px;
      }

      @media (min-width: 980px) {
        .outputs {
          grid-template-columns: 1fr 1fr;
        }
      }

      .sheet {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 16px 16px 6px;
        min-height: 300px;
      }

      .sheet h2 {
        margin: 0 0 8px;
        font-size: 18px;
      }

      .sheet .meta {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 10px;
      }

      ol.problem-list,
      ol.answer-list {
        margin: 0 0 12px 20px;
        padding: 0;
      }

      ol.problem-list li,
      ol.answer-list li {
        margin: 0 0 10px;
      }

      .blank {
        display: inline-block;
        min-width: 90px;
        border-bottom: 2px dotted #333;
        height: 1.2em;
        vertical-align: baseline;
      }

      ol.problem-list .expr,
      ol.answer-list .expr {
        display: inline-block;
        width: var(--xcol-w);
        min-width: var(--xcol-w);
      }

      ol.answer-list .ans {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      ol.answer-list .value {
        display: inline-block;
        min-width: 90px;
        font-weight: 600;
        text-align: left;
        color: #c62828;
      }

      @page {
        size: A4;
        margin: 7mm;
      }

      .print-only {
        display: none;
      }

      @media print {
        .no-print {
          display: none !important;
        }

        .print-only {
          display: inline-block !important;
        }

        body.print-problems #answers-sheet {
          display: none !important;
        }

        body.print-answers #problems-sheet {
          display: none !important;
        }

        body.print-problems #controls,
        body.print-answers #controls {
          display: none !important;
        }

        header {
          margin-bottom: 4px;
        }

        header .title-line {
          justify-content: space-between;
        }

        header p,
        .sheet .meta {
          display: none !important;
        }

        .container {
          padding: 0 4mm;
        }

        .sheet {
          border: none;
          padding: 0;
        }

        #problems-title,
        #answers-title {
          display: none !important;
        }

        body.print-problems #problems,
        body.print-answers #answers {
          display: none !important;
        }

        #problems-grid,
        #answers-grid {
          display: grid !important;
          grid-template-columns: 1fr 1fr;
          grid-auto-flow: column;
          gap: 0 8mm;
          list-style: none;
          margin: 0 0 0 20px;
          padding: 0;
        }

        #problems-grid {
          height: calc(100vh - 26mm);
          counter-reset: pnum;
        }

        #answers-grid {
          height: calc(100vh - 26mm - 18mm);
          counter-reset: anum;
        }

        body.count-10 #problems-grid,
        body.count-10 #answers-grid {
          grid-template-rows: repeat(5, 1fr);
        }

        body.count-20 #problems-grid,
        body.count-20 #answers-grid {
          grid-template-rows: repeat(10, 1fr);
        }

        #problems-grid li,
        #answers-grid li {
          position: relative;
          padding-left: 1.8em;
          display: flex;
          align-items: center;
          break-inside: avoid;
          page-break-inside: avoid;
          white-space: nowrap;
        }

        #problems-grid li::before,
        #answers-grid li::before {
          position: absolute;
          left: 0;
          width: 1.8em;
          text-align: right;
          font-weight: 600;
        }

        #problems-grid li::before {
          counter-increment: pnum;
          content: "(" counter(pnum) ") ";
        }

        #answers-grid li::before {
          counter-increment: anum;
          content: "(" counter(anum) ") ";
        }

        #problems-grid .expr,
        #answers-grid .expr {
          display: inline-block;
          width: var(--xcol-w-print);
          min-width: var(--xcol-w-print);
        }

        #problems-grid .blank {
          min-width: 70px;
        }

        #answers-grid .ans {
          display: inline-flex;
          align-items: center;
          gap: 4px;
        }

        #answers-grid .value {
          display: inline-block;
          min-width: 32mm;
          font-weight: 600;
          text-align: left;
          color: #c62828;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="title-line">
        <h1>正の数・負の数プリント</h1>
        <span class="score-box print-only" aria-label="点数記入欄">点数（　　　　　）点</span>
      </div>
      <p>加法・減法・乗法・除法から選んで、正の数と負の数の計算問題を自動生成します。</p>
    </header>

    <div class="container">
      <section id="controls" class="controls no-print" aria-label="生成条件の指定">
        <div class="grid">
          <div class="field">
            <label for="absMin">数の絶対値の範囲</label>
            <div class="row">
              <input id="absMin" type="number" inputmode="numeric" min="0" max="20" value="0" aria-describedby="hintAbs" />
              <span class="sep">〜</span>
              <input id="absMax" type="number" inputmode="numeric" min="0" max="20" value="10" aria-describedby="hintAbs" />
            </div>
            <div class="hint" id="hintAbs">0〜20 の範囲で指定します。問題文には 0 を使いません。</div>
          </div>

          <div class="field">
            <label><input id="allowNegative" type="checkbox" checked /> 負の数を含める</label>
            <div class="hint">オフにすると、1以上の正の数だけで問題を作ります。</div>
          </div>

          <fieldset class="check-group field">
            <legend>出題する計算</legend>
            <div class="check-row">
              <label><input id="opAdd" type="checkbox" checked /> 加法</label>
              <label><input id="opSub" type="checkbox" checked /> 減法</label>
              <label><input id="opMul" type="checkbox" checked /> 乗法</label>
              <label><input id="opDiv" type="checkbox" checked /> 除法</label>
            </div>
            <div class="hint">複数選ぶと、なるべく均等に出題します。除法の答えは必ず整数です。</div>
          </fieldset>

          <div class="field">
            <label>プレビュー</label>
            <div class="hint" id="previewText">例: -</div>
          </div>

          <div class="field">
            <label>問題数</label>
            <div class="toggle-bar" role="group" aria-label="問題数の選択">
              <button type="button" id="count10" class="toggle selected" aria-pressed="true">10問</button>
              <button type="button" id="count20" class="toggle" aria-pressed="false">20問</button>
            </div>
          </div>
        </div>

        <div class="buttons">
          <button id="btnGenerate">問題を生成</button>
          <button id="btnPrintProblems" class="secondary">問題だけ印刷</button>
          <button id="btnPrintAnswers" class="secondary">模範解答だけ印刷</button>
        </div>
        <div id="message" aria-live="polite" class="error" style="min-height: 1.2em;"></div>
      </section>

      <section class="outputs" aria-label="出力領域">
        <div id="problems-sheet" class="sheet" aria-labelledby="problems-title">
          <h2 id="problems-title">問題</h2>
          <div class="meta" id="problems-meta">設定: -</div>
          <ol id="problems" class="problem-list"></ol>
          <ol id="problems-grid" class="print-only"></ol>
        </div>
        <div id="answers-sheet" class="sheet" aria-labelledby="answers-title">
          <h2 id="answers-title">模範解答</h2>
          <div class="meta" id="answers-meta">設定: -</div>
          <ol id="answers" class="answer-list"></ol>
          <ol id="answers-grid" class="print-only"></ol>
        </div>
      </section>
    </div>

    <script>
      function randInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      function shuffle(list) {
        const copy = list.slice();
        for (let i = copy.length - 1; i > 0; i--) {
          const j = randInt(0, i);
          const tmp = copy[i];
          copy[i] = copy[j];
          copy[j] = tmp;
        }
        return copy;
      }

      function pickSignedValue(absMin, absMax, allowNegative, allowZero) {
        let absValue = randInt(absMin, absMax);
        if (!allowZero) {
          const lower = Math.max(1, absMin);
          absValue = randInt(lower, absMax);
        }
        if (absValue === 0) return 0;
        if (!allowNegative) return absValue;
        return Math.random() < 0.5 ? -absValue : absValue;
      }

      function formatOperand(value) {
        return value < 0 ? `(${value})` : `${value}`;
      }

      function formatProblem(problem) {
        const left = formatOperand(problem.left);
        const right = formatOperand(problem.right);
        if (problem.type === "addition") return `${left} + ${right}`;
        if (problem.type === "subtraction") return `${left} - ${right}`;
        if (problem.type === "multiplication") return `${left} × ${right}`;
        return `${left} ÷ ${right}`;
      }

      function formatAnswer(problem) {
        return `${problem.result}`;
      }

      function typeLabel(type) {
        if (type === "addition") return "加法";
        if (type === "subtraction") return "減法";
        if (type === "multiplication") return "乗法";
        return "除法";
      }

      function readConfig() {
        const absMin = parseInt(document.getElementById("absMin").value, 10);
        const absMax = parseInt(document.getElementById("absMax").value, 10);
        const allowNegative = !!document.getElementById("allowNegative").checked;
        const count = document.getElementById("count20").classList.contains("selected") ? 20 : 10;
        const operations = [];

        if (document.getElementById("opAdd").checked) operations.push("addition");
        if (document.getElementById("opSub").checked) operations.push("subtraction");
        if (document.getElementById("opMul").checked) operations.push("multiplication");
        if (document.getElementById("opDiv").checked) operations.push("division");

        if (!Number.isFinite(absMin) || !Number.isFinite(absMax) || absMin < 0 || absMax > 20 || absMin > absMax) {
          return { ok: false, message: "数の絶対値の範囲は0〜20で、最小値は最大値以下にしてください。" };
        }

        if (operations.length === 0) {
          return { ok: false, message: "出題する計算を1つ以上選んでください。" };
        }

        if (absMax === 0) {
          return { ok: false, message: "問題文に0を出さないため、数の絶対値の最大値は1以上にしてください。" };
        }

        return {
          ok: true,
          config: {
            absMin,
            absMax,
            allowNegative,
            count,
            operations
          }
        };
      }

      function createProblemOfType(cfg, type) {
        const { absMin, absMax, allowNegative } = cfg;
        if (type === "addition") {
          const left = pickSignedValue(absMin, absMax, allowNegative, false);
          const right = pickSignedValue(absMin, absMax, allowNegative, false);
          return { type, left, right, result: left + right };
        }

        if (type === "subtraction") {
          const left = pickSignedValue(absMin, absMax, allowNegative, false);
          const right = pickSignedValue(absMin, absMax, allowNegative, false);
          return { type, left, right, result: left - right };
        }

        if (type === "multiplication") {
          const left = pickSignedValue(absMin, absMax, allowNegative, false);
          const right = pickSignedValue(absMin, absMax, allowNegative, false);
          return { type, left, right, result: left * right };
        }

        const divisor = pickSignedValue(absMin, absMax, allowNegative, false);
        const quotient = pickSignedValue(absMin, absMax, allowNegative, false);
        return {
          type,
          left: divisor * quotient,
          right: divisor,
          result: quotient
        };
      }

      function buildUniqueKey(problem) {
        if (problem.type === "addition" || problem.type === "multiplication") {
          const ordered = [problem.left, problem.right].sort((a, b) => a - b);
          return `${problem.type}|${ordered[0]}|${ordered[1]}`;
        }
        return `${problem.type}|${problem.left}|${problem.right}`;
      }

      function buildTypePlan(operations, count) {
        const plan = [];
        while (plan.length < count) {
          for (const type of operations) {
            if (plan.length >= count) break;
            plan.push(type);
          }
        }
        return shuffle(plan);
      }

      function generateProblems() {
        const msg = document.getElementById("message");
        msg.textContent = "";
        const res = readConfig();
        if (!res.ok) {
          msg.textContent = res.message;
          renderMeta(null);
          clearLists();
          return;
        }

        const cfg = res.config;
        const problems = [];
        const seen = new Set();
        const plan = buildTypePlan(cfg.operations, cfg.count);
        const maxAttempts = cfg.count * 300;
        let attempts = 0;

        while (problems.length < cfg.count && attempts < maxAttempts) {
          const type = plan[problems.length];
          const problem = createProblemOfType(cfg, type);
          const key = buildUniqueKey(problem);
          attempts += 1;
          if (seen.has(key)) continue;
          seen.add(key);
          problems.push(problem);
        }

        if (problems.length < cfg.count) {
          msg.textContent = "同じ問題を除外すると十分な問題数を生成できませんでした。条件を広げてください。";
          renderMeta(null);
          clearLists();
          return;
        }

        renderMeta(cfg);
        document.body.classList.remove("count-10", "count-20");
        document.body.classList.add(cfg.count === 20 ? "count-20" : "count-10");
        renderProblems(problems);
        renderAnswers(problems);
        updatePreview();
      }

      function renderMeta(meta) {
        const problemsMeta = document.getElementById("problems-meta");
        const answersMeta = document.getElementById("answers-meta");
        if (!meta) {
          problemsMeta.textContent = "設定: -";
          answersMeta.textContent = "設定: -";
          return;
        }

        const operationNames = meta.operations.map(typeLabel).join("・");
        const signText = meta.allowNegative ? "負の数あり" : "負の数なし";
        const text = `設定: 絶対値${meta.absMin}〜${meta.absMax} / ${signText} / ${operationNames} / 全${meta.count}問`;
        problemsMeta.textContent = text;
        answersMeta.textContent = text;
      }

      function clearLists() {
        const ids = ["problems", "answers", "problems-grid", "answers-grid"];
        ids.forEach((id) => {
          const el = document.getElementById(id);
          if (el) el.innerHTML = "";
        });
      }

      function appendProblemLine(container, problem, withAnswer) {
        const li = document.createElement("li");

        const expr = document.createElement("span");
        expr.className = "expr";
        expr.textContent = `${formatProblem(problem)} = `;

        const ans = document.createElement("span");
        ans.className = "ans";

        if (withAnswer) {
          const value = document.createElement("span");
          value.className = "value";
          value.textContent = formatAnswer(problem);
          ans.appendChild(value);
        } else {
          const blank = document.createElement("span");
          blank.className = "blank";
          ans.appendChild(blank);
        }

        li.appendChild(expr);
        li.appendChild(ans);
        container.appendChild(li);
      }

      function renderProblems(list) {
        const normal = document.getElementById("problems");
        const grid = document.getElementById("problems-grid");
        normal.innerHTML = "";
        grid.innerHTML = "";
        list.forEach((problem) => {
          appendProblemLine(normal, problem, false);
          appendProblemLine(grid, problem, false);
        });
      }

      function renderAnswers(list) {
        const normal = document.getElementById("answers");
        const grid = document.getElementById("answers-grid");
        normal.innerHTML = "";
        grid.innerHTML = "";
        list.forEach((problem) => {
          appendProblemLine(normal, problem, true);
          appendProblemLine(grid, problem, true);
        });
      }

      function printOnly(which) {
        document.body.classList.remove("print-problems", "print-answers");
        if (which === "problems") document.body.classList.add("print-problems");
        if (which === "answers") document.body.classList.add("print-answers");
        window.print();
        setTimeout(() => {
          document.body.classList.remove("print-problems", "print-answers");
        }, 200);
      }

      function updatePreview() {
        const preview = document.getElementById("previewText");
        const res = readConfig();
        if (!res.ok) {
          preview.textContent = "例: -";
          return;
        }

        const cfg = res.config;
        const type = cfg.operations[randInt(0, cfg.operations.length - 1)];
        const sample = createProblemOfType(cfg, type);
        preview.textContent = `例: ${formatProblem(sample)} = ${formatAnswer(sample)}`;
      }

      function setCount(count) {
        const btn10 = document.getElementById("count10");
        const btn20 = document.getElementById("count20");
        if (count === 20) {
          btn20.classList.add("selected");
          btn20.setAttribute("aria-pressed", "true");
          btn10.classList.remove("selected");
          btn10.setAttribute("aria-pressed", "false");
        } else {
          btn10.classList.add("selected");
          btn10.setAttribute("aria-pressed", "true");
          btn20.classList.remove("selected");
          btn20.setAttribute("aria-pressed", "false");
        }
        generateProblems();
      }

      document.getElementById("btnGenerate").addEventListener("click", generateProblems);
      document.getElementById("btnPrintProblems").addEventListener("click", () => printOnly("problems"));
      document.getElementById("btnPrintAnswers").addEventListener("click", () => printOnly("answers"));
      document.getElementById("count10").addEventListener("click", () => setCount(10));
      document.getElementById("count20").addEventListener("click", () => setCount(20));

      ["absMin", "absMax", "allowNegative", "opAdd", "opSub", "opMul", "opDiv"].forEach((id) => {
        const el = document.getElementById(id);
        el.addEventListener("input", updatePreview);
        el.addEventListener("change", updatePreview);
      });

      generateProblems();
      updatePreview();
    </script>
  </body>
</html>
